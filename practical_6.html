<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buddy4Study Scholarship Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }
        form {
            width: 550px;
            margin: 30px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
        }
        .logo {
            display: block;
            margin: 0 auto 10px;
            width: 120px;
        }
        h2 {
            text-align: center;
        }
        fieldset {
            margin-bottom: 15px;
            border: 2px solid #28a745;
            border-radius: 8px;
        }
        legend {
            font-weight: bold;
            color: #28a745;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
        }
        .inline {
            width: auto;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<form>
    <!-- Logo -->
    <img src="https://via.placeholder.com/120x60?text=Buddy4Study+Logo" alt="Logo" class="logo">

    <h2>Buddy4Study Scholarship Registration</h2>

    <fieldset>
        <legend>Personal Details</legend>

        <label>Full Name:</label>
        <input type="text" name="name" required>

        <label>Email ID:</label>
        <input type="email" name="email" required>

        <label>Mobile Number:</label>
        <input type="tel" name="mobile" required>

        <label>Gender:</label>
        <input type="radio" name="gender" value="male" class="inline"> Male
        <input type="radio" name="gender" value="female" class="inline"> Female
        <input type="radio" name="gender" value="other" class="inline"> Other
    </fieldset>

    <fieldset>
        <legend>Academic Information</legend>

        <label>Current Education Level:</label>
        <select name="education">
            <option value="">--Select--</option>
            <option>Class 10</option>
            <option>Class 12</option>
            <option>Diploma</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
        </select>

        <label>Field of Study:</label>
        <input type="text" name="field">

        <label>Percentage / CGPA:</label>
        <input type="text" name="marks">
    </fieldset>

    <fieldset>
        <legend>Scholarship Preferences</legend>

        <label>Type of Scholarship:</label>
        <input type="radio" name="scholarship_type" value="merit" class="inline"> Merit-Based
        <input type="radio" name="scholarship_type" value="need" class="inline"> Need-Based
        <input type="radio" name="scholarship_type" value="sports" class="inline"> Sports

        <label>Areas of Interest:</label>
        <input type="checkbox" name="interest" value="engineering" class="inline"> Engineering
        <input type="checkbox" name="interest" value="medical" class="inline"> Medical
        <input type="checkbox" name="interest" value="management" class="inline"> Management
        <input type="checkbox" name="interest" value="arts" class="inline"> Arts
    </fieldset>

    <fieldset>
        <legend>Additional Details</legend>

        <label>Family Income (per year):</label>
        <select name="income">
            <option value="">--Select--</option>
            <option>Below 1 Lakh</option>
            <option>1 - 3 Lakhs</option>
            <option>3 - 5 Lakhs</option>
            <option>Above 5 Lakhs</option>
        </select>

        <label>Why do you need this scholarship?</label>
        <textarea rows="4"></textarea>
    </fieldset>

    <button type="submit">Register</button>
</form>

</body>
</html>
